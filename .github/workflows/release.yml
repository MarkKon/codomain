name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app:
    name: Build local macOS app artifact
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build app
        run: npm run tauri:build -- --target universal-apple-darwin --bundles app

      - name: Prepare release asset
        id: asset
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          app_path="$(find src-tauri/target -path '*/release/bundle/macos/Codomain.app' -type d | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "No app bundle found under src-tauri/target" >&2
            exit 1
          fi

          mkdir -p release-assets
          asset_name="Codomain_${version}_universal.app.zip"
          asset_path="release-assets/${asset_name}"
          ditto -c -k --keepParent "${app_path}" "${asset_path}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.asset.outputs.asset_path }}" \
            --title "Codomain ${GITHUB_REF_NAME}" \
            --notes "Unsigned local-use macOS app bundle for ${GITHUB_REF_NAME}."
